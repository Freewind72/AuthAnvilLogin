plugins {
    id 'java-library'
    id 'maven-publish'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

repositories {
    mavenLocal()
    maven {
        url = uri('https://repo.papermc.io/repository/maven-public/')
    }

    maven {
        url = uri('https://oss.sonatype.org/content/groups/public/')
    }

    maven {
        url = uri('https://repo.codemc.org/repository/maven-public/')
    }

    maven {
        url = uri('https://repo.extendedclip.com/releases/')
    }

    maven {
        url = uri('https://repo.codemc.io/repository/maven-snapshots/')
    }
    maven {
        url = uri('https://mvn.wesjd.net/')
    }
    maven {
        url = uri('https://repo.opencollab.dev/main/')
    }

    maven {
        url = uri('https://repo.maven.apache.org/maven2/')
    }
    maven {
        name = "codemc-repo"
        url = "https://repo.codemc.io/repository/maven-public/"
    }
    maven {
        name = "jitpack"
        url = "https://jitpack.io"
    }
    gradlePluginPortal()
    maven {url = uri("https://repo.papermc.io/repository/maven-public/")}
}

dependencies {
    api "net.wesjd:anvilgui:1.10.11-SNAPSHOT"
    compileOnly libs.io.papermc.paper.paper.api
    compileOnly libs.fr.xephi.authme
    compileOnly libs.me.clip.placeholderapi
    compileOnly libs.org.geysermc.geyser.api
    compileOnly libs.org.geysermc.floodgate.api
    implementation 'com.google.code.gson:gson:2.13.2'
    implementation 'org.nanohttpd:nanohttpd:2.3.1'  // NanoHTTPD Web 服务器
    compileOnly "com.github.games647:fastlogin.bukkit:1.12-SNAPSHOT"
    compileOnly "com.github.LoneDev6:API-ItemsAdder:3.6.1"
}

// 创建一个包含所有依赖的 fat jar 任务
task fatJar(type: Jar) {
    archiveClassifier = 'all'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    
    manifest {
        attributes['Main-Class'] = 'net.chen.ll.authAnvilLogin.AuthAnvilLogin'
        attributes['paperweight-mappings-namespace'] = 'spigot'
    }
    
    from sourceSets.main.output
    
    dependsOn configurations.runtimeClasspath
    from {
        configurations.runtimeClasspath.findAll { it.name.endsWith('jar') }.collect { zipTree(it) }
    }
    
    // 排除签名文件
    exclude 'META-INF/*.SF'
    exclude 'META-INF/*.DSA'
    exclude 'META-INF/*.RSA'
    exclude 'module-info.class'
}


group = 'net.chen.ll'
version = '2.2.2-Stable'
description = 'authanvillogin'
java.sourceCompatibility = JavaVersion.VERSION_21

publishing {
    publications {
        maven(MavenPublication) {
            from(components.java)
        }
    }
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
}

tasks.withType(Javadoc) {
    options.encoding = 'UTF-8'
}
tasks.jar {
    manifest {
        attributes["paperweight-mappings-namespace"] = "spigot"
    }
}
// 使用 fatJar 作为默认构建任务
tasks.build.dependsOn fatJar
